race_metadata:
  year: 2024
  race_number: 0
  circuit_name: "Unknown"
  race_id: 0

camera:
  resolution: "1920x1080"
  fps: 30
  rotation: 180
  exposure_compensation: 1.0  # Range: -2.0 to 2.0. Positive values brighten the image.
  gain_range: "2.0 16.0"      # Optional: Controls analog gain (ISO). E.g., "1.0 16.0"

capture:
  # Capture mode can be 'periodic', 'manual', or 'both'
  mode: "both"
  interval_seconds: 15
  storage_paths:
    input: "data/input"
    processed: "data/processed"
    failed: "data/failed"
    manual: "data/manual"

database:
  type: "sqlite"
  path: "data/f1_data.db"
  processing_interval: 300  # 5 minutes

logging:
  level: "INFO"

llm:
  provider: "together"  # or 'ollama'
  ollama_host: "http://10.0.20.17:11434"
  ollama_model: "granite3.2-vision:latest"
  together_model: "Moonshotai/kimi-k2.5"
  # "meta-llama/Llama-4-Maverick-17B-128E-Instruct-FP8"
  # "moonshotai/Kimi-K2.5"
  prompts:
    full_extraction: |
      You are an expert F1 Telemetry Optical Character Recognition (OCR) system. Your task is to extract race data from the provided image of an F1 timing screen and output it as a valid, parsable JSON object.
      
      ### OBJECTIVE
      Analyze the image and return a SINGLE JSON object containing the current state of the race. Your output should include data for all drivers.
      CRITICAL: You MUST extract data for EVERY driver visible in the timing tower. Do not truncate the list or stop after a few drivers. Ensure your `race_data` array contains all rows (typically 20-22).
      
      ### INSTRUCTIONS
      
      **1. Identify Global Race Status**
      *   **current_lap**: Locate the current lap number (integer). Look at the top right, e.g., "LAP 13/58", the current lap is 13.
      *   **conditions_air_temp**: Air temperature in celsius (integer or float).
      *   **conditions_track_temp**: Track temperature in celsius (integer or float).
      *   **wind**: Wind speed in kph (integer or float).
      
      **2. Extract Race Data (Rows)**
      For each driver row visible, extract:
      *   **position**: The integer rank (e.g., 1, 2, 3).
      *   **driver_code**: Either three character driver code or full driver last name.
      *   **position_delta**: Integer with number of positions gained or lost since start of the race. Gained is denoted in green with an up arrow, lost is denoted in red with a down arrow. If a dash or missing, it's 0.
      *   **gap**: Time gap between current car and the lead car (e.g., "LEADER", "+3.047", "+1 LAP"). If the column conveys additional information like "OUT" or "IN PIT" or "PIT", record that here.
      *   **in_pit**: Boolean flag. Set to true if the gap column says "PIT" or "IN PIT".
      *   **out_retired**: Boolean flag. Set to true if the gap column says "OUT".
      *   **interval**: Time interval to the next driver ahead (e.g., "+3.047", "+2.225").
      *   **last_lap**: Time duration of the last lap (e.g., "1:54.008").
      *   **current_tire**: Parsed from a single graphic that displays tire_compound and tire_age history on a single line which represents the number of laps completed. The pattern of the icons on the line goes char->int->char->int where each char represents the tire compound and the int immediately following to the right of the char is the tire age for that compound. For each image parse out the CURRENT (rightmost pair of icons on the tire history graphic) tire compound character (s=soft (in red), m=medium (in yellow), h=hard (in white), i=inter (in green), w=wet (in blue)).
      *   **tire_age**: Parsed from the rightmost pair of icons on the tire history graphic. The integer immediately following to the right of the current tire compound character.
      
      ### OUTPUT FORMAT
      Output **only** raw JSON. DO NOT use `...` or truncate the output in any way. You must provide the full array of all drivers visible.
      
      **JSON Structure:**
      ```json
      {
        "current_lap": integer,
        "conditions_air_temp": float or null,
        "conditions_track_temp": float or null,
        "wind": float or null,
        "race_data": [
          {
            "position": integer,
            "driver_code": "string",
            "position_delta": integer,
            "gap": "string or null",
            "in_pit": boolean,
            "out_retired": boolean,
            "interval": "string or null",
            "last_lap": "string or null",
            "current_tire": "string or null",
            "tire_age": integer or null
          }
        ]
      }
      ```
      
      ### EXAMPLES
      
      **Example 1:**
      (Note: Example truncated for brevity. YOUR OUTPUT MUST INCLUDE ALL DRIVERS)
      ```json
      {
        "current_lap": 13,
        "conditions_air_temp": 24,
        "conditions_track_temp": 36,
        "wind": 7.2,
        "race_data": [
          {"position": 1, "driver_code": "LECLERC", "position_delta": 3, "gap": "LEADER", "in_pit": false, "out_retired": false, "interval": null, "last_lap": "1:54.008", "current_tire": "M", "tire_age": 12},
          {"position": 2, "driver_code": "HAMILTON", "position_delta": 5, "gap": "+3.047", "in_pit": false, "out_retired": false, "interval": "+3.047", "last_lap": "1:54.958", "current_tire": "M", "tire_age": 12},
          {"position": 12, "driver_code": "ALBON", "position_delta": 3, "gap": "PIT", "in_pit": true, "out_retired": false, "interval": null, "last_lap": "1:33.980", "current_tire": "M", "tire_age": 11},
          {"position": 20, "driver_code": "HADJAR", "position_delta": -17, "gap": "OUT", "in_pit": false, "out_retired": true, "interval": null, "last_lap": null, "current_tire": "M", "tire_age": 10}
        ]
      }
      ```
